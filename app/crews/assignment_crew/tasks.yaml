generate_assignment:
  description: >
    Generate one original university-level assignment for the subtopic
    "{subtopic}". The assignment must follow the structure, tone, and
    expectations of this institutional evaluation document:
    {evaluation_document}.

    Full text of the evaluation document (use this as the authoritative
    source for rubric criteria, task framing, and tone — never paste it
    verbatim or mention the document inline):
    ===== EVALUATION DOCUMENT BEGIN =====
    {evaluation_document_content}
    ===== EVALUATION DOCUMENT END =====

    LANGUAGE RULES (these override anything you've absorbed from the evaluation
    document's academic tone):
    - Target Grade 8 reading level. A 15-year-old student should read each
      sentence once and know what to do.
    - Average sentence length under 18 words. Break long sentences into two.
    - Prefer everyday words. When you must use a film term (e.g. "mise-en-scène",
      "blocking", "diegetic"), define it in the same sentence in plain English
      ("blocking — basically, where actors stand and move in the scene").
    - Never copy the evaluation document's sentence structure or vocabulary.
      Rewrite borrowed framing in your own simpler words.
    - Banned phrases: "deconstruct", "deconstruction", "passive viewing", "active
      deconstruction", "moreover", "furthermore", "thus", "hence", "in essence",
      "fundamentally", "it is important to note", "constitutes", "delineates",
      "encapsulates", "paradigm", "narrative architecture", "formal analysis"
      (use "close analysis" instead), "internal state" (use "feelings" or
      "emotions"), "directorial vision" (use "the director's choices").
    - No semicolons. No nested clauses three levels deep. Active voice over
      passive: "Record one scene" — not "one scene must be recorded".
    - Rubric criterion labels must be plain English too. Bad: "Analytical Depth
      of Cinematic Language". Good: "How well you read the film's choices".
      Each label must still be specific and outcome-based, not generic.

    FORMATTING RULES (apply throughout — heavy formatting is the goal, not
    paragraphs):
    - Keep paragraphs to 1-2 short sentences max.
    - Use **bold** for the first appearance of any film term or key concept.
    - The Task section MUST be a numbered list of concrete steps, not a single
      paragraph. Each numbered step starts with a bold action label
      (e.g. "**1. Pick a scene:**") followed by 1-2 short sentences.
    - Include a `**You'll make:**` bullet list of 2-3 deliverables right after
      the Objective.
    - Include a `> **Watch out:**` blockquote callout naming one common mistake
      students make on this kind of task.
    - Include a `**Tips:**` bullet list of 2-3 practical hints before the
      Submission Format.

    Hard rules:
    - Base the assignment on the official knowledge source for the subtopic.
      Do not invent theories, frameworks, or external references.
    - The task must be practical and activity-based, not a summary or theory
      essay. Examples: rewriting a scene's emotional arc, blocking a scene,
      recording a video exercise, building a storyboard or shooting script,
      reflecting on an in-class group activity.
    - The Task section must specify all three of: (1) a concrete deliverable
      artifact (e.g. storyboard, recorded scene, blocking diagram, dialogue
      rewrite, observation log, performance recording), (2) a clear evaluation
      moment (in-class screening, peer critique, group walkthrough, instructor
      review), and (3) a real-world frame (a specific scene to rework, a real
      situation to observe, a defined setup to attempt). If any of the three
      is missing, redesign before outputting.
    - The Task instructions must use concrete action verbs (rewrite, block,
      record, storyboard, stage, observe, capture, perform, edit, rehearse).
      "Analyze", "discuss", or "reflect on" may appear only as supporting verbs,
      never as the primary task.
    - Tasks must not be summaries, comparative essays, or "analyze and discuss"
      prompts. The output must be a creative or practical artifact the student
      produces, not a written analysis.
    - Never reference file extensions (.pdf, .docx), source tags, or URLs.
    - Never mention due dates.
    - Never refer to yourself, AI, or roles.

    Rubric guidance — total 100 marks. If the evaluation document name above
    matches one of these activity flags:
      Shoot, Practical class with acting dept,
      group discussion - culminated three modules above, theory,
      in class exercise
    then use this default rubric:
      Acting Techniques                                       20
      Visual Storytelling (Blocking, Staging, Composition)    20
      Dialogue and Structure                                  20
      Improvisation and Performance Nuance                    20
      Use of Digital Tools, VFX & Story Structure             20
    Otherwise infer rubric criteria from the evaluation document text above;
    keep the total at 100. Each criterion label must come from a specific
    learning outcome or skill named in the evaluation document — avoid generic
    labels like "Quality", "Creativity", "Effort", or "Presentation". Use
    precise outcome-based labels such as "Visual continuity across shots",
    "Use of subtext in dialogue", or "Blocking clarity in two-character scenes".

    Output exactly the markdown structure below.

    📄 **Title**: [Insert Assignment Title Here]

    > **In one line:** [a single plain-English sentence describing what the
    student will create and why it matters]

    📝 **Assignment**

    **Objective**:
    [1-2 short sentences on what this assignment helps the student learn or
    practise. Plain English.]

    **You'll make:**
    - [Deliverable 1]
    - [Deliverable 2]
    - [Deliverable 3 if applicable]

    **Task**:

    **1. [Action label, e.g. Pick a scene]:** [1-2 short sentences with the
    instruction.]

    **2. [Action label]:** [1-2 short sentences.]

    **3. [Action label]:** [1-2 short sentences.]

    **4. [Action label]:** [1-2 short sentences.]

    > **Watch out:** [one common mistake students make on this task, in one
    short sentence]

    **Tips:**
    - [Practical hint 1]
    - [Practical hint 2]
    - [Practical hint 3 if useful]

    **Submission Format**:
    [What the student must submit — recordings, sketches, diagrams, short
    write-ups, etc. Keep it to 1-2 short sentences.]

    📊 **Rubric for Evaluation (Total: 100 Marks)**

    | Criteria | Weightage |
    |---|---|
    | [Plain-English criterion 1] | XX |
    | [Plain-English criterion 2] | XX |
    | [Plain-English criterion 3] | XX |
    | [Plain-English criterion 4] | XX |
    | [Plain-English criterion 5] | XX |

    You can learn more using this knowledge source: **[Insert Source Name]**
  expected_output: >
    A single markdown assignment following the structure above. No preamble,
    no commentary outside the markdown.

revise_assignment:
  description: >
    Revise the existing assignment based on the lecturer's revision notes.
    Maintain the structure and tone of the original; reframe only what's
    necessary. Sections the lecturer has not asked to change must be preserved
    verbatim — do not rewrite Objective, Task, Submission Format, or Rubric
    unless the revision notes explicitly target that section.

    Subtopic: "{subtopic}"
    Evaluation document: {evaluation_document}

    Full text of the evaluation document (authoritative reference for
    rubric and tone — never quote it verbatim or name it inline):
    ===== EVALUATION DOCUMENT BEGIN =====
    {evaluation_document_content}
    ===== EVALUATION DOCUMENT END =====

    Original assignment:
    ---
    {content}
    ---

    Lecturer's revision notes:
    ---
    {changes}
    ---

    How to interpret revision notes:
    - "Make it more practical" → add production tasks, observational work, or
      performance elements.
    - "Add relevance to performance" → integrate actor blocking, movement
      studies, or scene rehearsal as required.
    - "Clarify learning outcome" → refine objectives to specify what students
      will learn or apply.

    LANGUAGE + FORMATTING RULES (same as generation — apply when rewriting any
    section, even if the original used heavier prose):
    - Grade 8 reading level, average sentence length under 18 words.
    - No banned academic phrases ("deconstruct", "passive viewing", "narrative
      architecture", "formal analysis", "directorial vision", "moreover",
      "furthermore", "thus", "hence", "constitutes", "encapsulates",
      "paradigm", "internal state", etc.). Use plain English equivalents.
    - Define every film term in the same sentence in plain English.
    - Task section must be a numbered list with bold action labels, not a
      paragraph. Each step is 1-2 short sentences.
    - Preserve the **You'll make:**, `> **Watch out:**`, and **Tips:** blocks
      if present. If the original assignment is missing them, add them when
      you touch the Task section.
    - Rubric criterion labels stay plain English ("How well you read the film's
      choices"), not academic ("Analytical Depth of Cinematic Language").

    Hard rules (same as generation):
    - Stay grounded in the assigned knowledge source for the subtopic.
    - Never reference unrelated material or invent content.
    - No file extensions, URLs, or source citations.
    - Mention reading material titles only at the end (Knowledge Source Used).
    - Keep the rubric structure from the evaluation document; only change
      scores if explicitly required by the lecturer's notes.
    - If the evaluation document matches one of these activity flags
      (Shoot, Practical class, Group exercise, In-class work, Performance-based
      module), default to the standard performance rubric:
        Acting Techniques                                       20
        Visual Storytelling (Blocking, Staging, Composition)    20
        Dialogue and Structure                                  20
        Improvisation and Performance Nuance                    20
        Use of Digital Tools, VFX & Story Structure             20
    - Never rewrite the full assignment unless major revision is requested.
    - If the revision touches the Task section, the rewritten Task must still
      satisfy the activity-quality checklist (concrete deliverable + clear
      evaluation moment + real-world frame) and use concrete action verbs
      (rewrite, block, record, storyboard, stage, observe, capture, perform,
      edit, rehearse) — never as a summary or "analyze and discuss" prompt.

    Output exactly:

    📄 **Title**: [Updated Title if revised]

    > **In one line:** [single plain-English sentence — keep or refresh]

    📝 **Assignment**

    **Objective**:
    [Updated or refined assignment objective — only change if needed. 1-2 short
    sentences in plain English.]

    **You'll make:**
    - [Deliverable 1]
    - [Deliverable 2]
    - [Deliverable 3 if applicable]

    **Task**:

    **1. [Action label]:** [1-2 short sentences.]

    **2. [Action label]:** [1-2 short sentences.]

    **3. [Action label]:** [1-2 short sentences.]

    **4. [Action label]:** [1-2 short sentences.]

    > **Watch out:** [one common mistake in one short sentence]

    **Tips:**
    - [Practical hint 1]
    - [Practical hint 2]
    - [Practical hint 3 if useful]

    **Submission Format**:
    [Update only if changes were requested or implied. 1-2 short sentences.]

    📊 **Rubric for Evaluation (Total: 100 Marks)**

    | Criteria | Weightage |
    |---|---|
    | [Plain-English criterion 1] | XX |
    | [Plain-English criterion 2] | XX |
    | [Plain-English criterion 3] | XX |
    | [Plain-English criterion 4] | XX |
    | [Plain-English criterion 5] | XX |

    ---

    📚 **Knowledge Source Used**:
    [The reading material or reference used — without file extensions or links]
  expected_output: >
    A single markdown revised assignment following the structure above.
    No preamble or commentary outside the markdown.
