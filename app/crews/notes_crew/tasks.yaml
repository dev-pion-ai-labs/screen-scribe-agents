write_notes:
  description: >
    Produce comprehensive study notes in markdown format on the subtopic "{subtopic}",
    approximately 2200-2400 words when printed. The reading materials assigned to this
    subtopic are: {reading_materials}. The current year is {current_year}.

    Full text of the assigned reading materials (use as your primary grounding
    source — quote ideas faithfully, but never paste passages verbatim or
    mention these documents inline):
    ===== READING MATERIALS BEGIN =====
    {reading_materials_content}
    ===== READING MATERIALS END =====

    Use a conversational, question-and-answer style. Anticipate student questions
    (e.g. "You might wonder why... The answer is..."), and respond as if engaging a
    curious teen. Include analogies (e.g. "editing is like a song's beat"). Use the
    web search tool to find recent (2020-{current_year}) film examples. Across the
    entire document, use at least 4 distinct film examples, with at least 3 of them
    being Indian films released in 2020 or later. Do not reuse the same film in
    more than one section.

    LANGUAGE RULES (these override anything you've absorbed from the reading
    materials' academic tone):
    - Target Grade 8 reading level. A 14-year-old should follow every sentence on
      the first read.
    - Average sentence length under 18 words. Break long sentences into two.
    - Prefer everyday words over technical ones. When you must use a film term
      (e.g. "mise-en-scène", "diegetic"), define it in the same sentence in plain
      English ("mise-en-scène — basically, everything you see inside the frame").
    - Never copy the reading materials' sentence structure. Rewrite every borrowed
      idea in your own simpler words.
    - Banned phrases that signal academic tone: "moreover", "furthermore", "thus",
      "hence", "in essence", "fundamentally", "it is important to note",
      "constitutes", "delineates", "encapsulates", "paradigm".
    - No semicolons. No em-dash chains. No nested clauses three levels deep.
    - Active voice over passive. "The director frames the shot" — not "the shot is
      framed by the director".

    FORMATTING RULES (apply throughout — heavy formatting is the goal, not a wall
    of prose):
    - Keep paragraphs to 2-3 sentences max. Break often.
    - Use **bold** for the first appearance of any film term or key concept.
    - Use bullet lists whenever you have 3+ parallel items. Don't bury lists inside
      a paragraph.
    - Use numbered lists for steps or sequences.
    - Inside each section, include at least one of: a bullet list, a numbered list,
      or a blockquote (`>`) callout for a memorable line / "Quick takeaway".
    - End every Question section (1-4) with a one-line **Quick takeaway:** in bold,
      summarising the section in under 20 words.

    Ground core explanations in the assigned reading materials, but never mention
    them inline. Only refer to them in the final "Reference Materials" section.
    Each of the four question sections must explain at least one specific concept,
    principle, or technique drawn from the reading materials — not generic film
    knowledge. The reading material may be longer than what's directly relevant;
    concentrate on the chapters or passages that address {subtopic} and skim the
    rest. When you borrow an idea, REPHRASE it — do not preserve the textbook's
    wording.

    Output structure (use exactly this markdown skeleton):

    # {subtopic} Notes

    > **In one line:** [a single-sentence hook for the whole topic in plain English]

    ## What is {subtopic} All About?
    [2-3 short paragraphs explaining purpose and relevance, with one recent
    web-sourced example. End with a bullet list titled **You'll learn:** of 3-4
    bullets previewing what the notes cover.]

    ## [Question 1 — frame as: What is it & why does it matter?]
    [Open with a short paragraph defining the concept in plain English. Then a
    bullet list of 3-4 key points drawn from the reading materials (rephrased,
    not quoted). Then a paragraph applying it to one modern Indian film example.
    Address a student doubt directly.]

    **Quick takeaway:** [one-line summary in bold]

    ## [Question 2 — frame as: How does it work mechanically?]
    [Open with a short paragraph + analogy. Then a **numbered list** of the steps
    or stages in the process. Then one short paragraph applying it to a
    web-sourced film example.]

    **Quick takeaway:** [one-line summary in bold]

    ## [Question 3 — frame as: What is a key element or principle?]
    [Open with a short paragraph. Then a bullet list of the principle's
    sub-elements or rules. Then a paragraph comparing a popular film and a recent
    one.]

    **Quick takeaway:** [one-line summary in bold]

    ## [Question 4 — frame as: How do I apply it, and what's a common mistake?]
    [Open with a short paragraph. Then a numbered list titled **Try this:** of
    3-5 practical steps. Then a blockquote callout starting with `> **Watch out:**`
    describing one common pitfall, and a web-sourced tip.]

    **Quick takeaway:** [one-line summary in bold]

    ## What's the Point of All This?
    [Short closing paragraph summarising importance and addressing one final
    doubt, ending with a one-line encouragement to practise.]

    ## Reference Materials
    Learn more using: {reading_materials_inline}

    Vary the framing per subtopic:
    - For "film analysis": focus on decoding visuals and narrative techniques.
    - For "screenplay writing": emphasise crafting stories and character arcs.
    - For "visual storytelling": highlight camera angles and composition.
    - For "dialogue": explore how words drive emotion and plot.

    Hard rules — do NOT do any of these:
    - Mention file extensions, URLs, or the search process.
    - Reference artifact tags, IDs, or the generation process.
    - Use robotic or overly formal language; no emojis, slang, or "Hey, guys".
    - Mention yourself, AI, or roles like mentor/lecturer.
    - Speculate beyond reading materials for core explanations.
    - Repeat the same film examples across subtopics.
    - Output anything like "【8:18†Film Art_ An Introduction】" — never include
      square-bracket source citations.
    - Mention reading material titles inline; only in the Reference Materials section.
    - Include social-media hashtags (e.g. "#cinema") or decorative star/asterisk
      separators (e.g. "***", "* * *") in the content. Standard markdown
      `**bold**` and bullet `-` are required and do not count as decorative.
    - Ask the student a follow-up like "Would you like help with another part?".
    - Use framing like "According to the book...", "The reading materials state...",
      or any phrase that signals a source. State the concept directly.
    - Repeat the same film example in more than one section.
    - Use any banned academic-register word listed in LANGUAGE RULES.
    - Write paragraphs longer than 3 sentences. Break them.
    - Skip the **Quick takeaway:** line at the end of any Question section.

  expected_output: >
    A single markdown document approximately 2200-2400 words long, following the
    structure above exactly. No preamble, no commentary outside the markdown.
